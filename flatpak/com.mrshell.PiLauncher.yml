app-id: com.mrshell.PiLauncher

runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk

command: PiLauncher

finish-args:
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --device=dri
  - --device=all

  - --filesystem=xdg-download
  - --filesystem=xdg-documents

  - --filesystem=xdg-data/.minecraft
  - --filesystem=xdg-data/PiLauncher:create
  - --filesystem=xdg-data/fonts
  - --filesystem=/run/udev:ro

  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: PiLauncher
    buildsystem: simple

    build-commands:
      - install -D PiLauncher /app/bin/PiLauncher
      - install -D com.mrshell.PiLauncher.desktop /app/share/applications/com.mrshell.PiLauncher.desktop
      - install -D com.mrshell.PiLauncher.png /app/share/icons/hicolor/256x256/apps/com.mrshell.PiLauncher.png
      - install -D com.mrshell.PiLauncher.metainfo.xml /app/share/metainfo/com.mrshell.PiLauncher.metainfo.xml

    sources:
      - type: file
        path: ../src-tauri/target/release/PiLauncher

      - type: file
        path: com.mrshell.PiLauncher.desktop

      - type: file
        path: com.mrshell.PiLauncher.png

      - type: file
        path: com.mrshell.PiLauncher.metainfo.xml