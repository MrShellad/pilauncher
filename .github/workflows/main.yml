name: Build Tauri App (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    environment: VITE_CURSEFORGE_API_KEY

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 💣 关键：所有 pnpm 操作放一个 step
      - name: Setup pnpm & install deps
        run: |
          npm install -g pnpm@9
          pnpm -v
          pnpm install --frozen-lockfile

      # 🦀 Rust
      - uses: dtolnay/rust-toolchain@stable

      - run: rustup target add aarch64-apple-darwin

      - run: |
          brew update
          brew install create-dmg

      # 🏗️ 前端（同样确保 pnpm 可用）
      - name: Build frontend
        run: |
          npm install -g pnpm@9
          pnpm build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.VITE_CURSEFORGE_API_KEY }}
          VITE_MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}

      # 🚀 Tauri
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_API_KEY: ${{ secrets.VITE_CURSEFORGE_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
        with:
          args: --target universal-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/universal-apple-darwin/release/bundle
