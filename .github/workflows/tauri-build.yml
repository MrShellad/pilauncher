name: Build Tauri App (macOS ARM)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    # ⚠️ 必须：你用了 Environment secrets
    environment: VITE_CURSEFORGE_API_KEY

    steps:
      # 📦 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 🟢 Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 📦 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 🦀 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🎯 macOS ARM target
      - name: Add macOS ARM target
        run: rustup target add aarch64-apple-darwin

      # 🍺 Tauri 依赖
      - name: Install macOS dependencies
        run: |
          brew update
          brew install create-dmg

      # 📦 安装前端依赖
      - name: Install dependencies
        run: pnpm install

      # 🏗️ 构建前端（注入 VITE 环境变量）
      - name: Build frontend
        run: pnpm build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.VITE_CURSEFORGE_API_KEY }}
          VITE_MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}

      # 🚀 构建 Tauri（注入 Rust 环境变量）
      - name: Build Tauri App (macOS ARM)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 👉 给 Rust 用（更安全）
          CURSEFORGE_API_KEY: ${{ secrets.VITE_CURSEFORGE_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}

        with:
          args: --target aarch64-apple-darwin

      # 📦 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: src-tauri/target/aarch64-apple-darwin/release/bundle